# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  - variable: NEXT_PUBLIC_APP_URL
    value: https://nvians.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_ADMIN_HOST
    value: admin.dashboard.nvians.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_ADMIN_URL
    value: https://admin.dashboard.nvians.com
    availability:
      - BUILD
      - RUNTIME
